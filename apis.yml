name: Alibaba
description: >-
  Alibaba is a multinational technology conglomerate founded in 1999 by Jack
  Ma, focused on e-commerce, retail, internet, and technology. The company
  operates major online marketplaces including Taobao, Tmall, and AliExpress,
  connecting millions of sellers with consumers globally. Alibaba Cloud
  (Aliyun), founded in 2009, is a global leader in cloud computing and
  artificial intelligence, serving enterprises, developers, and government
  organizations in more than 200 countries. Alibaba Cloud provides cloud
  computing, storage, networking, big data, AI/ML, security, and developer
  services through a comprehensive API ecosystem. The OpenAPI Explorer provides
  a web interface for discovering, testing, and generating SDK code for
  hundreds of Alibaba Cloud service APIs. The company also operates Alipay
  (digital payments), DingTalk (enterprise collaboration), and 1688 (B2B
  wholesale).
apis:
  - aid: alibaba:alibaba-cloud-api
    name: Alibaba Cloud API
    description: >-
      Alibaba Cloud provides a comprehensive API ecosystem covering all major
      cloud services including Elastic Compute Service (ECS), Object Storage
      Service (OSS), Container Service for Kubernetes (ACK), Relational
      Database Service (RDS), MaxCompute (big data), Function Compute
      (serverless), API Gateway, Content Delivery Network (CDN), and hundreds
      of additional services. The OpenAPI Explorer provides a web interface and
      WebCLI for calling APIs and automatically generating SDK code in Java,
      Python, Node.js, PHP, Go, and other languages.
    humanURL: https://api.alibabacloud.com/
    baseURL: https://ecs.aliyuncs.com
